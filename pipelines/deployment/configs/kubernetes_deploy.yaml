"""Kubernetes deployment configuration."""

deployment:
  model_path: ./training_outputs/qlora
  model_name: mistral-7b-qlora
  model_version: 1.0.0
  output_dir: ./deployments
  output_format: kubernetes

  # Registry settings
  container_registry: ghcr.io/llm-whisperer
  image_tag: latest

  # Quantization and optimization
  quantization: int4
  optimization_level: 1

  # Kubernetes settings
  kubernetes:
    replicas: 2
    resources:
      requests:
        memory: "16Gi"
        nvidia.com/gpu: "1"
      limits:
        memory: "32Gi"
        nvidia.com/gpu: "1"
    strategy: RollingUpdate
    max_surge: 1
    max_unavailable: 0

  # Service configuration
  service:
    type: ClusterIP
    port: 8000
    target_port: 8000

  # Ingress configuration
  ingress:
    enabled: true
    host: llm-whisperer.example.com
    tls_enabled: true
    tls_secret: llm-whisperer-tls
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

  # HPA configuration
  hpa:
    enabled: true
    min_replicas: 1
    max_replicas: 10
    target_cpu_utilization: 70
    target_memory_utilization: 80

  # Health checks
  readiness_probe:
    path: /health/ready
    initial_delay_seconds: 60
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 6

  liveness_probe:
    path: /health/live
    initial_delay_seconds: 30
    period_seconds: 30
    timeout_seconds: 5
    failure_threshold: 3

  # Resource management
  node_selector:
    gpu-type: nvidia-a100
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  # Version
  major: 1
  minor: 0
  patch: 0