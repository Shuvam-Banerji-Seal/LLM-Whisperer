version: 1

thresholds:
  max_null_ratio: 0.02
  max_duplicate_ratio: 0.03
  min_avg_tokens: 12
  max_avg_tokens: 4096
  min_language_confidence: 0.9

policy_checks:
  require_schema_validation: true
  require_pii_scan: true
  require_toxicity_scan: true
  require_license_metadata: true

rag_checks:
  require_chunk_metadata: true
  require_source_document_id: true
  max_empty_chunk_ratio: 0.01

quality_gates:
  validation:
    enabled: true
    strict_mode: true
    fail_on_warning: false

  checks:
    - name: format_validation
      enabled: true
      config:
        allowed_formats: [json, parquet]
        max_file_size_mb: 512

    - name: text_quality
      enabled: true
      config:
        min_word_count: 3
        max_word_count: 10000
        check_spelling: false
        check_grammar: false

    - name: data_diversity
      enabled: true
      config:
        min_unique_tokens_ratio: 0.3
        max_repetition_window: 10
        max_repetition_ratio: 0.15

    - name: completeness
      enabled: true
      config:
        required_fields: [text, source, timestamp]
        allow_partial_completion: false

    - name: deduplication
      enabled: true
      config:
        method: simhash
        threshold: 0.85
        batch_size: 10000