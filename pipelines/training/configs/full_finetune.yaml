# Full fine-tuning configuration
training:
  model_name: "mistralai/Mistral-7B-v0.1"
  dataset_path: "data/processed/alpaca"
  output_dir: "./training_outputs/full_finetune"

  # Training parameters
  num_epochs: 3
  batch_size: 2
  learning_rate: 1e-5
  warmup_steps: 100
  max_grad_norm: 1.0
  weight_decay: 0.01

  # Full fine-tuning (no LoRA)
  training_method: full
  quantization_enabled: false
  lora_rank: null
  lora_alpha: null
  lora_dropout: null

  # Optimization
  mixed_precision: true
  gradient_checkpointing: true
  gradient_accumulation_steps: 16
  optimizer: adamw_torch
  precision: bf16

  # Evaluation and monitoring
  eval_steps: 500
  save_steps: 500
  log_steps: 100

  # Monitoring
  use_wandb: true
  wandb_project: llm-full-finetune
  use_mlflow: false

  # Memory optimization
  dataloader_num_workers: 4
  prefetch_factor: 2