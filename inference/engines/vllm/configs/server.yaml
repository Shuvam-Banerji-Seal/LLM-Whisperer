server:
  host: 0.0.0.0
  port: 8000
  model: meta-llama/Llama-3.1-8B-Instruct

runtime:
  gpu_memory_utilization: 0.90
  max_num_seqs: 128
  max_model_len: 8192
  tokenizer_mode: auto
  tensor_parallel_size: 1
  enable_chunked_prefill: true

api:
  api_key: local-dev-key
  served_model_name: local-model
