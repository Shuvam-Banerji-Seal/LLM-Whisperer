environment: prod
owner: llm-whisperer-platform

storage:
  dataset_root: s3://llm-whisperer-prod/datasets
  model_root: s3://llm-whisperer-prod/models
  run_root: s3://llm-whisperer-prod/runs

compute:
  default_device: cuda
  max_gpu_count: 8

network:
  offline_mode: true
  allow_external_downloads: false

registry:
  mlflow_tracking_uri: ${MLFLOW_TRACKING_URI_PROD}

feature_flags:
  enable_experimental_tools: false
  enable_auto_eval: true
  enable_strict_safety_gate: true
