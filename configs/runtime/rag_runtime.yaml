version: 1

retrieval:
  embedding_model_id: bge-large-en-v1-5
  top_k_retrieval: 20
  top_k_rerank: 6
  reranker_model_id: bge-reranker-large

chunking:
  strategy: recursive
  chunk_size_tokens: 600
  chunk_overlap_tokens: 80

generation:
  llm_model_id: llama-3-1-8b-instruct
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9

quality_targets:
  min_groundedness: 0.8
  min_recall_at_5: 0.65
  max_hallucination_rate: 0.05
