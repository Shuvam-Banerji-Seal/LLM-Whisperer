version: 1

orchestration:
  default_workflow: feature_delivery
  max_parallel_subtasks: 3
  max_iterations: 12
  require_plan_before_implementation: true

safety:
  require_safety_review_for_risk: [medium, high, critical]
  block_on_policy_fail: true
  escalation_on_critical: true

timeouts:
  step_timeout_sec: 240
  workflow_timeout_sec: 3600

budgets:
  token_budget_per_workflow: 250000
  cost_budget_usd_per_workflow: 20
