version: 1

logging:
  level: info
  format: json
  redact_sensitive_fields: true
  output_paths:
    - /var/log/llm-whisperer/app.log
    - stdout

tracing:
  enabled: true
  provider: otel
  service_name: llm-whisperer
  sample_rate: 0.1
  exporters:
    - type: otlp
      endpoint: http://otel-collector:4317
      insecure: true

metrics:
  enabled: true
  export_interval_sec: 30
  include_token_metrics: true
  include_latency_percentiles: [50, 90, 95, 99]
  exporters:
    - type: prometheus
      port: 9090
      path: /metrics

  # Custom metrics
  custom_metrics:
    - name: request_duration_seconds
      type: histogram
      buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]
    - name: tokens_generated_total
      type: counter
    - name: active_requests
      type: gauge
    - name: model_cache_hit_ratio
      type: gauge

alerts:
  p95_latency_ms_threshold: 1200
  error_rate_threshold: 0.03
  hallucination_rate_threshold: 0.05
  on_call_channel: pagerduty

  # Alert rules
  rules:
    - name: high_error_rate
      condition: error_rate > 0.05
      severity: critical
      window_minutes: 5
    - name: high_latency
      condition: p95_latency > 2000
      severity: warning
      window_minutes: 10
    - name: model_out_of_memory
      condition: oom_errors > 3
      severity: critical
      window_minutes: 1

dashboards:
  grafana:
    enabled: true
    url: http://grafana:3000
    default_dashboard: llm-whisperer-main

health_check:
  endpoint: /health
  detailed: true