version: 1

profiles:
  dev_fast:
    engine: vllm
    tensor_parallel_size: 1
    max_model_len: 8192
    max_num_batched_tokens: 8192
    gpu_memory_utilization: 0.85
    temperature: 0.2
    top_p: 0.95

  prod_balanced:
    engine: vllm
    tensor_parallel_size: 2
    max_model_len: 16384
    max_num_batched_tokens: 32768
    gpu_memory_utilization: 0.9
    temperature: 0.2
    top_p: 0.9

  low_latency_strict:
    engine: onnxruntime
    execution_provider: cuda
    quantization: int8
    max_batch_size: 4
    target_p95_ms: 350

  throughput_max:
    engine: tensorrt
    quantization: fp16
    max_batch_size: 32
    target_tokens_per_sec: 2500
