# AGNO Models Configuration
#
# This configuration file defines available language models
# and their parameters for AGNO agents.
#
# Reference: https://docs.agno.com/agents/models
# Reference: https://docs.agno.com/models

# Available Model Providers
providers:
  
  # Anthropic Claude Models
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    timeout: 60
    
    models:
      # Latest Claude 3.5 Model
      claude-3-5-sonnet-20241022:
        context_window: 200000
        max_output_tokens: 4096
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
        recommended_for:
          - general_purpose
          - reasoning
          - coding
          - analysis
      
      # Claude 3.5 Haiku (Fast)
      claude-3-5-haiku-20241022:
        context_window: 200000
        max_output_tokens: 1024
        cost_per_1k_input: 0.0008
        cost_per_1k_output: 0.004
        recommended_for:
          - fast_inference
          - simple_tasks
          - cost_optimization
  
  # OpenAI Models
  openai:
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    timeout: 60
    
    models:
      gpt-4-turbo:
        context_window: 128000
        max_output_tokens: 4096
        cost_per_1k_input: 0.01
        cost_per_1k_output: 0.03
        recommended_for:
          - complex_tasks
          - reasoning
          - code_generation
      
      gpt-4o:
        context_window: 128000
        max_output_tokens: 4096
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.015
        recommended_for:
          - general_purpose
          - balanced_performance

# Default Model Configuration
defaults:
  # Default model provider
  provider: "anthropic"
  
  # Default model
  model: "claude-3-5-sonnet-20241022"
  
  # Default temperature (0.0-1.0)
  # Higher = more creative, Lower = more deterministic
  temperature: 0.7
  
  # Maximum tokens in response
  max_tokens: 2048
  
  # Top-p sampling (nucleus sampling)
  top_p: 0.9
  
  # Top-k sampling
  top_k: 50
  
  # Stop sequences
  stop_sequences: []

# Model-Specific Configurations
models:
  
  # Fast and cheap model for simple tasks
  fast_model:
    provider: "anthropic"
    model: "claude-3-5-haiku-20241022"
    temperature: 0.5
    max_tokens: 1024
    use_case: "Simple Q&A, summarization"
  
  # Balanced model for general use
  balanced_model:
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.7
    max_tokens: 2048
    use_case: "General-purpose tasks, analysis"
  
  # Creative model for generation tasks
  creative_model:
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.9
    max_tokens: 4096
    use_case: "Content creation, brainstorming"
  
  # Precise model for structured tasks
  precise_model:
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.2
    max_tokens: 2048
    use_case: "Code generation, structured output"

# Model Selection Strategies
selection_strategies:
  
  # Cost optimization: use cheapest model that meets requirements
  cost_optimized:
    priority: ["speed", "cost"]
    fallback_to_larger: true
    max_total_cost_per_month: 1000
  
  # Performance: use most capable model
  performance:
    priority: ["capability", "accuracy"]
    fallback_to_larger: false
  
  # Balanced: trade off between cost and performance
  balanced:
    priority: ["speed", "accuracy", "cost"]
    fallback_to_larger: true
    max_total_cost_per_month: 500

# Rate Limiting per Model
rate_limits:
  anthropic:
    requests_per_minute: 1000
    tokens_per_minute: 1000000
    daily_budget_usd: 100
  
  openai:
    requests_per_minute: 500
    tokens_per_minute: 500000
    daily_budget_usd: 50

# Fallback Chain
fallback:
  # Fallback models if primary fails
  chain:
    - "claude-3-5-sonnet-20241022"
    - "claude-3-5-haiku-20241022"
  
  # Retry strategy
  retry:
    max_attempts: 3
    backoff_factor: 2
    initial_delay_seconds: 1

# System Prompts (model-agnostic)
system_prompts:
  
  general_assistant: |
    You are a helpful AI assistant. Provide accurate, clear, and concise responses.
    Always cite sources when providing factual information.
  
  code_reviewer: |
    You are an expert code reviewer. Analyze code for:
    - Bugs and issues
    - Performance improvements
    - Best practices
    - Refactoring suggestions
    Provide specific, actionable feedback.
  
  research_assistant: |
    You are a research assistant. When researching topics:
    - Gather information from multiple sources
    - Evaluate source credibility
    - Synthesize findings
    - Cite all sources used
  
  qa_expert: |
    You are a Q&A expert. Answer questions accurately and thoroughly.
    If unsure, acknowledge limitations and suggest resources for more information.

# Model Testing and Evaluation
testing:
  # Enable model testing
  enabled: true
  
  # Test different models on sample queries
  benchmark:
    enabled: false
    sample_queries:
      - "What is machine learning?"
      - "Write a Python function to sort a list"
      - "Explain quantum computing"
    metrics:
      - latency
      - cost
      - quality
