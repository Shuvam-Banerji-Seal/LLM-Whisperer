$schema: https://json-schema.org/draft/2020-12/schema
title: AgentToolPolicy
type: object
required:
  - version
  - tools
  - role_policies
properties:
  version:
    type: string
  tools:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - risk_level
        - default_access
      properties:
        name:
          type: string
        risk_level:
          enum: [low, medium, high, critical]
        default_access:
          enum: [allow, deny, approval_required]
      additionalProperties: false
  role_policies:
    type: object
    additionalProperties:
      type: object
      properties:
        allow:
          type: array
          items:
            type: string
        deny:
          type: array
          items:
            type: string
        approval_required:
          type: array
          items:
            type: string
      additionalProperties: false
  sensitive_operations:
    type: array
    items:
      type: object
      required:
        - operation
        - approval_channel
      properties:
        operation:
          type: string
        approval_channel:
          type: string
      additionalProperties: false
additionalProperties: false
