$schema: https://json-schema.org/draft/2020-12/schema
title: AgentBenchmarkCase
type: object
required:
  - case_id
  - workflow
  - objective
  - input
  - pass_criteria
  - fail_criteria
  - scoring
properties:
  case_id:
    type: string
  workflow:
    enum: [feature_delivery, rag_improvement, fine_tuning_experiment, incident_response]
  objective:
    type: string
  input:
    type: object
  context:
    type: object
  pass_criteria:
    type: array
    minItems: 1
    items:
      type: string
  fail_criteria:
    type: array
    minItems: 1
    items:
      type: string
  scoring:
    type: object
    required: [deterministic_checks, llm_judge_rubric, min_score]
    properties:
      deterministic_checks:
        type: array
        items:
          type: string
      llm_judge_rubric:
        type: string
      min_score:
        type: number
        minimum: 0
        maximum: 5
    additionalProperties: false
additionalProperties: false
