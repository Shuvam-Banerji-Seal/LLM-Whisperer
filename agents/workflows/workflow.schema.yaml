$schema: https://json-schema.org/draft/2020-12/schema
title: AgentWorkflow
type: object
required:
  - version
  - workflow_id
  - entry_role
  - steps
properties:
  version:
    type: integer
    minimum: 1
  workflow_id:
    type: string
  entry_role:
    enum: [orchestrator, planner, researcher, implementer, reviewer, safety]
  inputs:
    type: array
    items:
      type: string
  steps:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, role, outputs]
      properties:
        id:
          type: string
        role:
          enum: [orchestrator, planner, researcher, implementer, reviewer, safety]
        prompt:
          type: string
        depends_on:
          type: array
          items:
            type: string
        when:
          type: string
        outputs:
          type: array
          minItems: 1
          items:
            type: string
      additionalProperties: false
  gates:
    type: array
    items:
      type: object
      required: [id, requires]
      properties:
        id:
          type: string
        requires:
          type: array
          minItems: 1
          items:
            type: string
      additionalProperties: false
  fallbacks:
    type: array
    items:
      type: object
      required: [on, action]
      properties:
        on:
          type: string
        action:
          type: string
      additionalProperties: false
additionalProperties: false
