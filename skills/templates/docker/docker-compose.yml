# Docker Compose for LLM Inference Stack
# Includes vLLM server, Prometheus monitoring, Grafana dashboards, and Redis cache

version: '3.8'

services:
  # vLLM Inference Server
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-inference
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      MODEL_NAME: "meta-llama/Llama-2-7b-hf"
      TENSOR_PARALLEL_SIZE: "2"
      DTYPE: "float16"
      GPU_MEMORY_UTILIZATION: "0.9"
      MAX_MODEL_LEN: "4096"
      MAX_NUM_SEQS: "256"
      ENABLE_CHUNKED_PREFILL: "true"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
      OMP_NUM_THREADS: "8"
    volumes:
      - model-cache:/root/.cache/huggingface
      - ./config/vllm:/app/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Cache for request deduplication
  redis:
    image: redis:7-alpine
    container_name: llm-redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      - vllm-server

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: llm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin123"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: llm-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - llm-network
    restart: unless-stopped

  # NVIDIA GPU Monitor
  nvidia-gpu-monitor:
    image: nvidia/nvidia-docker:latest
    container_name: llm-gpu-monitor
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
    command: nvidia-smi dmon -s pucvmet -c 0
    networks:
      - llm-network
    restart: unless-stopped

  # API Gateway / Load Balancer
  nginx:
    image: nginx:alpine
    container_name: llm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - llm-network
    depends_on:
      - vllm-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Postgres for logging
  postgres:
    image: postgres:15-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: llm_logs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_user"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  model-cache:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  postgres-data:
    driver: local

networks:
  llm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
