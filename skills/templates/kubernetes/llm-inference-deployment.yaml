# Kubernetes Deployment for LLM Inference with vLLM
# Production-ready deployment with resource management, autoscaling, and monitoring

apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: llm-inference
data:
  model_name: "meta-llama/Llama-2-7b-hf"
  tensor_parallel_size: "2"
  pipeline_parallel_size: "1"
  dtype: "float16"
  gpu_memory_utilization: "0.9"
  max_model_len: "4096"
  max_num_batched_tokens: "8192"
  max_num_seqs: "256"
  enable_chunked_prefill: "true"
  log_level: "INFO"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-inference-server
  namespace: llm-inference
spec:
  serviceName: vllm-inference
  replicas: 2
  selector:
    matchLabels:
      app: vllm-inference
  template:
    metadata:
      labels:
        app: vllm-inference
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - vllm-inference
            topologyKey: kubernetes.io/hostname
      
      containers:
      - name: vllm-server
        image: vllm/vllm-openai:latest
        imagePullPolicy: IfNotPresent
        
        # Environment configuration
        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: model_name
        - name: TENSOR_PARALLEL_SIZE
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: tensor_parallel_size
        - name: DTYPE
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: dtype
        - name: GPU_MEMORY_UTILIZATION
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: gpu_memory_utilization
        - name: MAX_MODEL_LEN
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: max_model_len
        - name: MAX_NUM_SEQS
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: max_num_seqs
        - name: ENABLE_CHUNKED_PREFILL
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: enable_chunked_prefill
        - name: OMP_NUM_THREADS
          value: "8"
        
        # Port configuration
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8001
          protocol: TCP
        
        # Resource requests and limits
        resources:
          requests:
            memory: "48Gi"
            cpu: "8"
            nvidia.com/gpu: "2"  # Request 2 GPUs
          limits:
            memory: "64Gi"
            cpu: "16"
            nvidia.com/gpu: "2"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: shared-memory
          mountPath: /dev/shm
      
      # Volumes
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      - name: shared-memory
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      
      # Node selector for GPU nodes
      nodeSelector:
        gpu: "true"
        gpu-type: "a100"  # Use A100 GPUs
      
      # Tolerations for GPU taints
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: llm-inference
spec:
  type: ClusterIP
  selector:
    app: vllm-inference
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8001
    targetPort: 8001
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference-lb
  namespace: llm-inference
spec:
  type: LoadBalancer
  selector:
    app: vllm-inference
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP

---
apiVersion: autoscaling.k8s.io/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-inference-hpa
  namespace: llm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: vllm-inference-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: llm-inference
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi
