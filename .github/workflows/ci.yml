name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pylint black mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          find . -name "requirements.txt" -exec pip install -r {} \;

      - name: Lint with pylint
        run: |
          pylint **/*.py --exit-zero --disable=C0114,C0115,C0116,R0913,R0914,R0915,W0718,E1101,C0301

      - name: Check formatting with black
        run: |
          black --check --exclude="sample_code/|skills/" . || true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short || true

  validate-skill-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill markdown files
        run: |
          echo "Validating skill files..."
          find skills/ -name "*.prompt.md" -type f | while read file; do
            if [ ! -s "$file" ]; then
              echo "ERROR: Empty skill file: $file"
              exit 1
            fi
            # Check for required sections
            for section in "Problem Statement" "Theory & Fundamentals" "Implementation Patterns" "Research References"; do
              if ! grep -q "$section" "$file"; then
                echo "WARNING: Missing section '$section' in $file"
              fi
            done
          done
          echo "Skill file validation complete!"

      - name: Validate YAML configs
        run: |
          python3 -c "
          import yaml, sys, os
          errors = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.yaml') or file.endswith('.yml'):
                      path = os.path.join(root, file)
                      try:
                          with open(path) as f:
                              yaml.safe_load(f)
                      except Exception as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('YAML Errors:')
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print('All YAML files are valid!')
          "
